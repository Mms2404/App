name: app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0-243.0.dev


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Animated icons and illustrations , UI
  flutter_screenutil: ^5.9.3
  rive: ^0.13.20
  flutter_svg: ^2.1.0
  google_nav_bar: ^5.0.7

  # Response parsing and markdown rendering
  google_generative_ai: ^0.4.7
  selectable: ^0.5.0
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2

  # Local storage and security
  flutter_secure_storage: ^9.2.4

  #Logging
  logger: ^2.7.0

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  app_settings: ^7.0.0
  # For location permissions , make changes in manifest (for android ) and info.plist ( for ios )

  # API 
  http: ^1.4.0
  dio: ^5.9.2

  # State management
  provider: ^6.1.5
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_bloc: ^9.1.1

  # Payment gateway
  razorpay_flutter: ^1.4.5    
  # ProGuard rules for release builds  ( android/app/proguard-rules.pro) 
  # -keepattributes *Annotation*
  # -dontwarn com.razorpay.**
  # -keep class com.razorpay.** {*;}

  # Firebase integration
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.0
  riverpod_generator: ^2.6.4
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/rive/
    - assets/icons/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf



# stable Riverpod 2.x + Freezed 2.x