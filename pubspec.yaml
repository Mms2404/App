name: app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0-243.0.dev


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  rive: ^0.13.20
  flutter_svg: ^2.1.0
  google_fonts: ^6.2.1
  http: ^1.4.0
  google_generative_ai: ^0.4.7
  selectable: ^0.5.0
  flutter_markdown: ^0.7.7+1
  flutter_secure_storage: ^9.2.4
  google_nav_bar: ^5.0.7
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/rive/
    - assets/icons/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
